<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tools</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  color:#222;
}

header{
  background:#7fd3ff;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.section{
  margin-bottom:40px;
}

.section h2{
  border-bottom:2px solid #7fd3ff;
  padding-bottom:5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  margin-top:15px;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:15px;
  text-decoration:none;
  color:#222;
  transition:0.2s;
}

.card:hover{
  background:#f3fbff;
  border-color:#7fd3ff;
}

.links ul{
  padding-left:18px;
}

.links li{
  margin:6px 0;
}

.links a{
  text-decoration:none;
  color:#0077aa;
}

.links a:hover{
  text-decoration:underline;
}
</style>

</head>
<body>

<header>
My Tools
</header> 

<div class="container">

<div class="section">
<h2>Tools</h2>

<div class="grid">

<a class="card" href="https://ikdknt2.github.io/mbld-trainer/">
<h3>MBLD Trainer</h3>
<p>Logging tool of MBLD attempts</p>
</a>

<a class="card" href="https://ikdknt2.github.io/sarahs-advanced-trainer/">
<h3>Sarah's Advanced trainer</h3>
<p>You can train Sarah's Advanced with virtual Skewb</p>
</a>

<a class="card" href="https://ikdknt2.github.io/timer-display/?id=123456">
<h3>G5 Display image generator</h3>
<p>Generate a G5-style timer display image. Set the time via URL parameters.</p>
</a>
  
</div>
</div>


</div>

</body>
</html>
